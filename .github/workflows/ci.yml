name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: sudo apt-get update && sudo apt-get install -y tesseract-ocr
      - run: python -m pip install -r backend/requirements.txt
      - name: Run backend tests
        run: |
          set +e
          python -m pytest backend -vv --tb=long > pytest.log 2>&1
          status=$?
          cat pytest.log
          if [ "$status" -ne 0 ]; then
            python - <<'PY'
          from pathlib import Path

          output = Path("pytest.log").read_text(encoding="utf-8", errors="replace")
          message = output[-3500:].replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
          print(f"::error title=pytest failed::{message}")
          PY
          fi
          exit "$status"
