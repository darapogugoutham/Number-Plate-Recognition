services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: mongodb://mongodb:27017
      MONGODB_DATABASE: anpr
      UPLOAD_DIR: /app/uploads
      HISTORY_FILE: /app/uploads/detections.json
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      - mongodb

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  backend_uploads:
  mongo_data:
